// ============================================================
// TABLE LAYOUT
// ============================================================
const TL = 90, TR = W - 90, TT = 110, TB = H - 70;
const CX = W / 2, CY = (TT + TB) / 2;
const GOAL_H = 160, GOAL_TOP = CY - 80, GOAL_BOT = CY + 80;
const PUCK_R = 15, PADDLE_R = 30;

// ============================================================
// INPUT
// ============================================================
const keys = {}, prevKeys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });
function pressed(code) { return keys[code] && !prevKeys[code]; }

function getGP(i) { return (navigator.getGamepads ? navigator.getGamepads() : [])[i] || null; }

// ============================================================
// GAME STATE
// ============================================================

let storyAct = 0;

// Cutscene state

// Match intro state

// VS select

const STAGE_NAMES = ['Classic', 'Neon Arena', 'The Oval Office', 'Final Stage'];

// Heat select
let heatActive = false, heatPlayer = null, heatIdx = 0, heatJustOpened = false;

// Current match config
let matchCfg = null;

// Game objects

// VFX
let shake = 0;
let puckStuckTimer = 0;
let puckAvgX = 0, puckAvgY = 0, puckAreaTimer = 0;
let flash = { r: 0, g: 0, b: 0, a: 0 };
let particles = [];
let msgs = [];

// ============================================================
// HELPERS
// ============================================================
function hexRGB(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return [r, g, b];
}
function wrapText(txt, x, y, maxW, lh) {
  const words = txt.split(' ');
  let line = '', cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy); line = w; cy += lh;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, cy);
}
function addMsg(text, color, dur = 120) { msgs.push({ text, color, t: dur, max: dur }); }
function addParticles(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r: 2+Math.random()*3, color, life: 40+Math.random()*30, maxLife: 70 });
  }
}
function doShake(s) { shake = Math.max(shake, s); }
function doFlash(r, g, b, a) { flash = { r, g, b, a }; }

// ============================================================
// PHYSICS
// ============================================================
function clampPuck(pk) {
  const spd = Math.hypot(pk.vx, pk.vy);
  const MAX = 22;
  if (spd > MAX) { pk.vx = pk.vx/spd*MAX; pk.vy = pk.vy/spd*MAX; }
  if (spd > 0 && spd < 1.5) { pk.vx = pk.vx/spd*1.5; pk.vy = pk.vy/spd*1.5; }
}
function hitPaddlePuck(pl, pk) {
  const dx = pk.x - pl.x, dy = pk.y - pl.y;
  const dist = Math.hypot(dx, dy);
  if (dist < pl.r + pk.r) {
    const nx = dx/dist, ny = dy/dist;
    const rel = (pk.vx - pl.vx)*nx + (pk.vy - pl.vy)*ny;
    if (rel < 0) {
      const rest = 1.3;
      pk.vx -= (1+rest)*rel*nx; pk.vy -= (1+rest)*rel*ny;
      pk.vx += pl.vx * 0.4; pk.vy += pl.vy * 0.4;
      const ov = pl.r + pk.r - dist;
      pk.x += nx*ov; pk.y += ny*ov;
      const hitPow = Math.hypot(pk.vx, pk.vy);
      pl.heat = Math.min(100, pl.heat + hitPow * 0.9);
      if (pl.powerShot) {
        pk.vx *= 3; pk.vy *= 3;
        pl.powerShot = false;
        addMsg('MOUNTAIN STRIKE!!!', CHARS[pl.char].color);
        doShake(20); doFlash(255,200,0,0.5);
        addParticles(pk.x, pk.y, CHARS[pl.char].color, 20);
      }
      clampPuck(pk);
      return true;
    }
  }
  return false;
}
function stepPuck(pk) {
  if (!pk) return;
  pk.x += pk.vx; pk.y += pk.vy;
  // Slight damping to feel more realistic
  pk.vx *= 0.999; pk.vy *= 0.999;
  // Walls
  if (pk.y - pk.r < TT) { pk.y = TT + pk.r; pk.vy = Math.abs(pk.vy); }
  if (pk.y + pk.r > TB) { pk.y = TB - pk.r; pk.vy = -Math.abs(pk.vy); }
  // Goals
  if (pk.x - pk.r < TL) {
    if (pk.y > GOAL_TOP && pk.y < GOAL_BOT) {
      if (shields[0] > 0 && !pk.decoy) { pk.vx = Math.abs(pk.vx); addMsg('SHIELD!', '#0ff'); return; }
      if (!pk.decoy) { goalScored(reverseGoals > 0 ? 0 : 1, pk); return; }
      else { pk.x = TL + pk.r; pk.vx = Math.abs(pk.vx); }
    } else { pk.x = TL + pk.r; pk.vx = Math.abs(pk.vx); }
  }
  if (pk.x + pk.r > TR) {
    if (pk.y > GOAL_TOP && pk.y < GOAL_BOT) {
      if (shields[1] > 0 && !pk.decoy) { pk.vx = -Math.abs(pk.vx); addMsg('SHIELD!', '#0ff'); return; }
      if (!pk.decoy) { goalScored(reverseGoals > 0 ? 1 : 0, pk); return; }
      else { pk.x = TR - pk.r; pk.vx = -Math.abs(pk.vx); }
    } else { pk.x = TR - pk.r; pk.vx = -Math.abs(pk.vx); }
  }
}
function goalScored(scorerIdx, pk) {
  if (state !== 'PLAYING') return;
  const scorer = scorerIdx === 0 ? p1 : p2;
  scorer.wins++;
  pointTimer = 200; pointWinner = scorerIdx; matchOver = false;
  const [r,g,b] = hexRGB(CHARS[scorer.char].color);
  doFlash(r,g,b,0.7); doShake(25);
  addParticles(pk.x, pk.y, CHARS[scorer.char].color, 30);
  epuck = null;
  state = 'POINT_SCORED';
  if (scorer.wins >= matchCfg.winsNeeded) { matchOver = true; matchWinner = scorerIdx; }
}
function resetPuck() {
  const dir = Math.random() > 0.5 ? 1 : -1;
  puck = { x: CX, y: CY + (Math.random()-0.5)*80, vx: dir*5, vy: (Math.random()-0.5)*4, r: PUCK_R };
  epuck = null; puckTrail = []; puckStuckTimer = 0; puckAvgX = CX; puckAvgY = CY; puckAreaTimer = 0;
}
function constrainPaddle(pl) {
  const can = invade[pl.side] > 0;
  let minX = TL + pl.r, maxX = pl.side === 0 ? CX - pl.r : TR - pl.r;
  let maxX2 = pl.side === 0 ? (can ? TR - pl.r : CX - pl.r) : TR - pl.r;
  let minX2 = pl.side === 0 ? TL + pl.r : (can ? TL + pl.r : CX + pl.r);
  pl.x = Math.max(minX2, Math.min(maxX2, pl.x));
  if (pl.ghostMode) { pl.y = Math.max(TT - pl.r*0.5, Math.min(TB + pl.r*0.5, pl.y)); }
  else { pl.y = Math.max(TT + pl.r, Math.min(TB - pl.r, pl.y)); }
}

// ============================================================
// AI
// ============================================================
function updateAI(ai, opp, pk, dt) {
  if (!ai.isAI) return;
  const diff = matchCfg && matchCfg.isFinal ? 0.93 : 0.78;
  let tx, ty;
  const onOurSide = ai.side === 1 ? pk.x > CX - 60 : pk.x < CX + 60;
  // Corner avoidance: back off when puck is pinned near wall on AI's side
  const puckNearWall = pk.y < TT + 80 || pk.y > TB - 80;
  const puckNearAIGoal = ai.side === 1 ? pk.x > TR - 150 : pk.x < TL + 150;
  if (puckNearWall && puckNearAIGoal) {
    tx = ai.side === 1 ? pk.x - 70 : pk.x + 70;
    ty = CY;
    ty = Math.max(TT + ai.r, Math.min(TB - ai.r, ty));
  } else if (onOurSide || invade[ai.side] > 0) {
    // Attack: predict
    const timeEstimate = Math.abs(pk.x - ai.x) / (Math.abs(pk.vx) + 0.1);
    tx = ai.side === 1 ? pk.x - 5 : pk.x + 5;
    ty = pk.y + pk.vy * timeEstimate * 0.4;
    ty = Math.max(TT + ai.r, Math.min(TB - ai.r, ty));
  } else {
    // Defend
    tx = ai.side === 1 ? TR - 110 : TL + 110;
    ty = CY + (pk.y - CY) * 0.6;
    ty = Math.max(TT + ai.r, Math.min(TB - ai.r, ty));
  }
  const dx = tx - ai.x, dy = ty - ai.y;
  const d = Math.hypot(dx, dy);
  if (d > 2) { ai.x += dx/d * ai.speed * dt * diff; ai.y += dy/d * ai.speed * dt * diff; }
  constrainPaddle(ai);

  // AI heat activation
  if (ai.heat >= 100 && !heatActive && !ai.heatUsing) {
    ai.heatUsing = true;
    setTimeout(() => {
      if (state === 'PLAYING' && ai.heat >= 100) {
        const moves = CHARS[ai.char].heatMoves;
        const move = moves[Math.floor(Math.random() * moves.length)];
        activateHeat(move.id, ai, opp);
        ai.heat = 0; ai.heatUsing = false;
      } else { ai.heatUsing = false; }
    }, 800 + Math.random() * 1200);
  }
}

// ============================================================
// HEAT MOVES
// ============================================================
function activateHeat(id, pl, opp) {
  const c = CHARS[pl.char];
  switch (id) {
    case 'speed_surge':
      if (puck) { puck.vx *= 2; puck.vy *= 2; clampPuck(puck); }
      if (epuck) { epuck.vx *= 2; epuck.vy *= 2; clampPuck(epuck); }
      addMsg('SPEED SURGE!!!', c.color); doFlash(...hexRGB(c.color), 0.4); doShake(10);
      setTimeout(() => {
        if (puck) { puck.vx *= 0.5; puck.vy *= 0.5; }
        if (epuck) { epuck.vx *= 0.5; epuck.vy *= 0.5; }
      }, 6000);
      break;
    case 'speed_surge_x3':
      if (puck) { puck.vx *= 3; puck.vy *= 3; clampPuck(puck); }
      addMsg('ABSOLUTE AUTHORITY!!!', c.color); doFlash(255,255,255,0.8); doShake(30);
      setTimeout(() => { if (puck) { puck.vx *= 0.33; puck.vy *= 0.33; } }, 3000);
      break;
    case 'double_puck':
      if (puck) epuck = { x: puck.x+15, y: puck.y+15, vx: -puck.vx*0.9, vy: puck.vy*0.8, r: PUCK_R };
      addMsg('SHADOW PUCK!!!', c.color); doShake(8);
      setTimeout(() => { epuck = null; }, 8000);
      break;
    case 'shield':
      shields[pl.side] = 480;
      addMsg('SHIELD ACTIVE!', '#00ffff'); doFlash(0,200,255,0.3);
      break;
    case 'power_shot':
      pl.powerShot = true;
      addMsg('NEXT HIT: MOUNTAIN STRIKE', c.color);
      break;
    case 'stage_shake':
      doShake(40); doFlash(200,150,50,0.5);
      if (puck) { puck.vx = (Math.random()-0.5)*16; puck.vy = (Math.random()-0.5)*16; clampPuck(puck); }
      if (epuck) { epuck.vx = (Math.random()-0.5)*16; epuck.vy = (Math.random()-0.5)*16; }
      addMsg('EARTHEN TREMOR!!!', c.color);
      break;
    case 'reverse_goals':
      reverseGoals = 600;
      addMsg('GOALS REVERSED!!!', '#ffff00'); doFlash(255,255,0,0.4);
      break;
    case 'ghost_paddle':
      pl.ghostMode = true;
      addMsg('PHANTOM STEP!!!', c.color);
      setTimeout(() => { pl.ghostMode = false; }, 6000);
      break;
    case 'warp':
      if (puck) { pl.x = puck.x + (pl.side===0 ? -PADDLE_R-8 : PADDLE_R+8); pl.y = puck.y; }
      addMsg('TELEPORT!!!', c.color); doFlash(...hexRGB(c.color), 0.5); doShake(12);
      break;
    case 'invade':
      invade[pl.side] = 300;
      addMsg('DOMINION!!!', c.color); doFlash(...hexRGB(c.color), 0.6); doShake(15);
      break;
    case 'decoy':
      if (puck) epuck = { x: puck.x, y: puck.y, vx: -puck.vx*0.6, vy: puck.vy*0.7, r: PUCK_R, decoy: true };
      addMsg('EXECUTIVE ORDER!!!', c.color);
      setTimeout(() => { epuck = null; }, 7000);
      break;
  }
}

// ============================================================
// DRAW: TABLE
// ============================================================
function drawTable(stage) {
  // Table bg
  let tColor, lineColor, borderColor;
  if (stage === 'neon') { tColor='#050520'; lineColor='#ff00ff'; borderColor='#00ffff'; }
  else if (stage === 'oval') { tColor='#0d2060'; lineColor='#cc0000'; borderColor='#c8a000'; }
  else if (stage === 'boss') { tColor='#0a0000'; lineColor='#660000'; borderColor='#ff0000'; }
  else { tColor='#0a4f2f'; lineColor='rgba(255,255,255,0.25)'; borderColor='#c8a000'; }

  ctx.fillStyle = tColor;
  ctx.fillRect(TL, TT, TR-TL, TB-TT);

  // Center line
  ctx.strokeStyle = lineColor; ctx.lineWidth = 2;
  ctx.setLineDash([12,10]);
  ctx.beginPath(); ctx.moveTo(CX,TT); ctx.lineTo(CX,TB); ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.strokeStyle = lineColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(CX, CY, 65, 0, Math.PI*2); ctx.stroke();

  // Border
  ctx.strokeStyle = borderColor; ctx.lineWidth = 5;
  ctx.strokeRect(TL, TT, TR-TL, TB-TT);

  // Goal pockets
  const gColor = '#000';
  ctx.fillStyle = gColor;
  ctx.fillRect(TL-35, GOAL_TOP, 35, GOAL_H);
  ctx.fillRect(TR, GOAL_TOP, 35, GOAL_H);
  ctx.strokeStyle = borderColor; ctx.lineWidth = 3;
  ctx.strokeRect(TL-35, GOAL_TOP, 35, GOAL_H);
  ctx.strokeRect(TR, GOAL_TOP, 35, GOAL_H);

  // Goal lines
  ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(TL, GOAL_TOP); ctx.lineTo(TL, GOAL_BOT); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(TR, GOAL_TOP); ctx.lineTo(TR, GOAL_BOT); ctx.stroke();

  // Neon glow extra
  if (stage === 'neon') {
    const t = Date.now() / 800;
    ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 15;
    ctx.strokeStyle = `rgba(255,0,255,${0.4+Math.sin(t)*0.3})`; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(CX, CY, 65, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  // Boss stage blood veins
  if (stage === 'boss') {
    ctx.strokeStyle = 'rgba(180,0,0,0.3)'; ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const sx = TL + Math.random()*(TR-TL), sy = TT + Math.random()*(TB-TT);
      ctx.beginPath(); ctx.moveTo(sx,sy);
      ctx.lineTo(sx+(Math.random()-0.5)*100, sy+(Math.random()-0.5)*100); ctx.stroke();
    }
  }
}

function drawShields() {
  for (let i = 0; i < 2; i++) {
    if (shields[i] <= 0) continue;
    const x = i === 0 ? TL : TR;
    const frac = shields[i] / 480;
    const t = Date.now() / 100;
    ctx.strokeStyle = `rgba(0,200,255,${0.5 + Math.sin(t)*0.4})`;
    ctx.lineWidth = 7;
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 20;
    ctx.beginPath(); ctx.moveTo(x, GOAL_TOP); ctx.lineTo(x, GOAL_BOT); ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

function drawPuck(pk, dim = false) {
  if (!pk) return;
  ctx.globalAlpha = dim ? 0.5 : 1;
  const grad = ctx.createRadialGradient(pk.x-4, pk.y-4, 2, pk.x, pk.y, pk.r);
  grad.addColorStop(0, dim ? '#666' : '#555');
  grad.addColorStop(1, dim ? '#333' : '#111');
  ctx.beginPath(); ctx.arc(pk.x, pk.y, pk.r, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = dim ? '#888' : '#aaa'; ctx.lineWidth = 2;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawPuckTrail() {
  for (let i = 0; i < puckTrail.length; i++) {
    const t = puckTrail[i];
    const a = (i / puckTrail.length) * 0.35;
    ctx.beginPath(); ctx.arc(t.x, t.y, PUCK_R * (i / puckTrail.length * 0.7 + 0.3), 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,200,50,${a})`; ctx.fill();
  }
}

function drawPaddle(pl) {
  const ch = CHARS[pl.char];
  const [r,g,b] = hexRGB(ch.color);
  const t = Date.now() / 300;

  // Glow aura
  if (pl.heat >= 100) {
    const pulse = 0.4 + Math.sin(t*3)*0.3;
    const grd = ctx.createRadialGradient(pl.x, pl.y, 0, pl.x, pl.y, pl.r*3);
    grd.addColorStop(0, `rgba(${r},${g},${b},${pulse})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.r*3, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();
  }

  // Shadow
  ctx.beginPath(); ctx.arc(pl.x+3, pl.y+4, pl.r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

  // Body
  const grad = ctx.createRadialGradient(pl.x-7, pl.y-7, 4, pl.x, pl.y, pl.r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.35, ch.color);
  grad.addColorStop(1, ch.glow);
  ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.r, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();

  // Ring
  ctx.strokeStyle = pl.heat >= 100 ? '#fff' : 'rgba(0,0,0,0.6)'; ctx.lineWidth = pl.heat >= 100 ? 3 : 2;
  ctx.stroke();

  // Handle grip
  ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.r*0.48, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 4; ctx.stroke();

  // Ghost mode flicker
  if (pl.ghostMode) {
    ctx.beginPath(); ctx.arc(pl.x, pl.y, pl.r+5, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${0.5+Math.sin(t*8)*0.4})`; ctx.lineWidth = 3; ctx.stroke();
  }
}

function drawHeatBar(pl, x, y, w = 200) {
  const ch = CHARS[pl.char];
  const [r,g,b] = hexRGB(ch.color);
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(x, y, w, 18);
  const fillW = (pl.heat / 100) * w;
  if (pl.heat >= 100) {
    const t = Date.now() / 200;
    const g2 = ctx.createLinearGradient(x, y, x+w, y);
    g2.addColorStop(0, ch.color); g2.addColorStop(0.5+Math.sin(t)*0.3, '#fff'); g2.addColorStop(1, ch.glow);
    ctx.fillStyle = g2;
    ctx.fillRect(x, y, w, 18);
  } else {
    ctx.fillStyle = ch.color; ctx.fillRect(x, y, fillW, 18);
  }
  ctx.strokeStyle = pl.heat >= 100 ? '#fff' : '#444'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, 18);
  // Label
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial Black'; ctx.textAlign = 'center';
  ctx.fillText(pl.heat >= 100 ? 'HEAT FULL - PRESS Q' : 'HEAT', x+w/2, y-3);
}

function drawHUD() {
  const c1 = CHARS[p1.char], c2 = CHARS[p2.char];
  // P1 name
  ctx.fillStyle = c1.color; ctx.font = 'bold 16px Arial Black'; ctx.textAlign = 'left';
  ctx.fillText(c1.name, TL, TT-18);
  // P2 name
  ctx.fillStyle = c2.color; ctx.font = 'bold 16px Arial Black'; ctx.textAlign = 'right';
  ctx.fillText(c2.name, TR, TT-18);
  // Scores
  ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial Black'; ctx.textAlign = 'center';
  ctx.fillText(p1.wins, CX-65, TT-12);
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 20px Arial Black';
  ctx.fillText('-', CX, TT-12);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial Black';
  ctx.fillText(p2.wins, CX+65, TT-12);
  // Required wins
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
  ctx.fillText(`First to ${matchCfg.winsNeeded}`, CX, TT-45);
  // Heat bars
  drawHeatBar(p1, TL, TB+12);
  drawHeatBar(p2, TR-200, TB+12);
  // Reversed goals warning
  if (reverseGoals > 0) {
    const t = Date.now()/300;
    ctx.fillStyle = `rgba(255,255,0,${0.7+Math.sin(t)*0.3})`;
    ctx.font = 'bold 15px Arial Black'; ctx.textAlign = 'center';
    ctx.fillText('!  GOALS REVERSED  !', CX, TT+22);
  }
  // Controls hint
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '11px Arial'; ctx.textAlign = 'center';
  const hint = p2.isAI
    ? 'WASD: move  |  Q: HEAT move when full'
    : 'P1: WASD + Q(heat)   P2: Arrows + /(heat)';
  ctx.fillText(hint, CX, H-6);
}

function drawBarBG() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d0805'); bg.addColorStop(1, '#1a0a00');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  // Floor
  ctx.fillStyle = '#2a1500'; ctx.fillRect(0, H*0.62, W, H*0.38);
  // Bar counter
  ctx.fillStyle = '#3d1e08'; ctx.fillRect(W*0.35, H*0.42, W*0.65, H*0.25);
  ctx.fillStyle = '#5c2d0e'; ctx.fillRect(W*0.35, H*0.40, W*0.65, H*0.04);
  // Stools
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = '#6b3515';
    ctx.beginPath(); ctx.arc(W*0.38 + i*90, H*0.62, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3d1e08'; ctx.fillRect(W*0.38+i*90-5, H*0.62, 10, 25);
  }
  // Bottles
  for (let i = 0; i < 7; i++) {
    const hue = i*35; ctx.fillStyle = `hsl(${hue},60%,20%)`;
    ctx.fillRect(W*0.55+i*33, H*0.33, 14, 45);
    ctx.fillStyle = `hsl(${hue},60%,35%)`; ctx.fillRect(W*0.55+i*33+2, H*0.34, 10, 15);
  }
  // Neon sign
  const nt = Date.now()/700;
  ctx.shadowColor = '#ff6b35'; ctx.shadowBlur = 20+Math.sin(nt)*8;
  ctx.fillStyle = `rgba(255,107,53,${0.8+Math.sin(nt)*0.2})`;
  ctx.font = "bold 22px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText("ROSARIO'S BAR", W*0.62, H*0.22);
  ctx.shadowBlur = 0;
}
function drawDarkBG() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  const t = Date.now()/2000;
  for (let i = 0; i < 15; i++) {
    const x = ((Math.sin(i*1.7+t)*0.5+0.5)*W), y = ((Math.cos(i*2.3+t*0.7)*0.5+0.5)*H);
    ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2);
    ctx.fillStyle = `rgba(200,0,0,${0.2+Math.sin(i+t)*0.1})`; ctx.fill();
  }
}

// ============================================================
// DRAW: PARTICLES & MESSAGES
// ============================================================
function drawParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    const a = p.life / p.maxLife;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*a, 0, Math.PI*2);
    ctx.fillStyle = p.color.replace(')', `,${a})`).replace('rgb','rgba');
    try { ctx.fillStyle = p.color; ctx.globalAlpha = a; ctx.fill(); } catch(e) {}
    ctx.globalAlpha = 1;
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }
}
function drawMessages() {
  for (let i = msgs.length-1; i >= 0; i--) {
    const m = msgs[i];
    const a = m.t / m.max;
    const y = H/2 - 80 - (msgs.length-1-i)*38;
    ctx.font = 'bold 22px Arial Black';
    ctx.textAlign = 'center';
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 5;
    ctx.strokeText(m.text, CX, y);
    ctx.fillStyle = m.color; ctx.fillText(m.text, CX, y);
    ctx.globalAlpha = 1;
    m.t--;
    if (m.t <= 0) msgs.splice(i,1);
  }
}

// SCREEN: CUTSCENE
// ============================================================
function updateCutsceneType() {
  const act = ACTS[storyAct];
  const scene = act.scenes[cs.sceneIdx];
  cs.typeTimer++;
  if (cs.typeTimer >= 2) { cs.typeTimer = 0; if (cs.typeIdx < scene.text.length) { cs.typeIdx++; cs.displayText = scene.text.slice(0, cs.typeIdx); } }
  if (pressed('Space') || pressed('Enter')) {
    if (cs.typeIdx < scene.text.length) { cs.typeIdx = scene.text.length; cs.displayText = scene.text; }
    else {
      cs.sceneIdx++;
      if (cs.sceneIdx >= act.scenes.length) advanceAct();
      else { const ns = act.scenes[cs.sceneIdx]; cs.typeIdx = 0; cs.typeTimer = 0; cs.displayText = ''; }
    }
  }
}
function drawCutscene() {
  const act = ACTS[storyAct];
  const scene = act.scenes[cs.sceneIdx];
  if (scene.bg === 'bar') drawBarBG(); else drawDarkBG();
  // Dialog box
  const bh = 155, by = H-bh-12;
  ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(12, by, W-24, bh);
  const spk = scene.speaker ? CHARS[scene.speaker] : null;
  const bColor = spk ? spk.color : '#c8a000';
  ctx.strokeStyle = bColor; ctx.lineWidth = 2; ctx.strokeRect(12, by, W-24, bh);
  if (spk) {
    ctx.fillStyle = spk.color; ctx.font = "bold 15px 'Arial Black'"; ctx.textAlign = 'left';
    ctx.fillText(spk.name.toUpperCase(), 26, by-7);
  }
  ctx.fillStyle = '#fff'; ctx.font = '18px Arial'; ctx.textAlign = 'left';
  wrapText(cs.displayText, 26, by+32, W-60, 27);
  if (cs.typeIdx >= act.scenes[cs.sceneIdx].text.length) {
    const pb = Math.sin(Date.now()/280) > 0 ? 1 : 0;
    ctx.fillStyle = `rgba(255,200,0,${pb})`; ctx.font = "bold 13px 'Arial Black'"; ctx.textAlign = 'right';
    ctx.fillText('PRESS SPACE TO CONTINUE  ▶', W-20, by+bh-12);
  }
}

// ============================================================
// SCREEN: MATCH INTRO (FOR LOVE / FOR DEATH / FOR GLORY)
// ============================================================
const INTRO_LINES = ['FOR LOVE', 'FOR DEATH', 'FOR GLORY!!!'];
const INTRO_COLORS = ['#ff69b4', '#dd2222', '#f1c40f'];
const INTRO_GLOW =   ['#ff0088', '#880000', '#c8a000'];

function drawMatchIntro() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  if (introPhase < 3) {
    const prog = Math.min(introTimer / 55, 1);
    const scale = 1 + (1-prog)*0.6;
    const alpha = Math.min(1, prog*2.5);
    ctx.save(); ctx.translate(CX, CY - 20); ctx.scale(scale, scale);
    ctx.shadowColor = INTRO_GLOW[introPhase]; ctx.shadowBlur = 40*prog;
    ctx.font = `bold ${introPhase===2?78:64}px 'Arial Black'`; ctx.textAlign = 'center';
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 10;
    ctx.strokeText(INTRO_LINES[introPhase], 0, 0);
    ctx.fillStyle = INTRO_COLORS[introPhase]; ctx.fillText(INTRO_LINES[introPhase], 0, 0);
    ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.restore();
    // Flash on entry
    if (introTimer === 1) { const [r,g,b] = hexRGB(INTRO_COLORS[introPhase]); doFlash(r,g,b,0.7); if (introPhase===2) doShake(18); }
  } else if (introPhase === 3) {
    // VS screen
    const prog = Math.min(introTimer/30, 1);
    ctx.globalAlpha = prog;
    const c1 = CHARS[p1.char], c2 = CHARS[p2.char];
    ctx.fillStyle = c1.color; ctx.font = "bold 30px 'Arial Black'"; ctx.textAlign = 'center';
    ctx.fillText(c1.name, CX-220, CY-10);
    ctx.fillStyle = '#fff'; ctx.font = "bold 22px 'Arial Black'";
    ctx.fillText('VS', CX, CY);
    ctx.fillStyle = c2.color; ctx.font = "bold 30px 'Arial Black'";
    ctx.fillText(c2.name, CX+220, CY-10);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = "14px Arial"; ctx.textAlign = 'center';
    ctx.fillText(c1.subtitle, CX-220, CY+18); ctx.fillText(c2.subtitle, CX+220, CY+18);
    ctx.globalAlpha = 1;
  }
}

function drawGameplay() {
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);

}

function drawHeatSelect(pl) {
  const ch = CHARS[pl.char];
  const [r,g,b] = hexRGB(ch.color);
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  const px = pl.side===0 ? 60 : W-360, py = 130, pw = 300, ph = 290;
  ctx.fillStyle = '#0d0d0d'; ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = ch.color; ctx.lineWidth = 3; ctx.strokeRect(px, py, pw, ph);
  ctx.fillStyle = ch.color; ctx.font = "bold 14px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText('— CHOOSE HEAT MOVE —', px+pw/2, py+24);
  const ctrl = pl.side===0 ? 'W/S select   Q confirm' : '↑/↓ select   / confirm';
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.font = '11px Arial';
  ctx.fillText(ctrl, px+pw/2, py+42);
  CHARS[pl.char].heatMoves.forEach((mv, i) => {
    const my = py + 64 + i*72;
    const sel = i === heatIdx;
    ctx.fillStyle = sel ? `rgba(${r},${g},${b},0.2)` : 'transparent';
    ctx.fillRect(px+8, my, pw-16, 64);
    if (sel) { ctx.strokeStyle = ch.color; ctx.lineWidth = 2; ctx.strokeRect(px+8, my, pw-16, 64); }
    ctx.fillStyle = sel ? '#fff' : '#bbb'; ctx.font = "bold 14px 'Arial Black'"; ctx.textAlign = 'left';
    ctx.fillText(mv.name, px+18, my+22);
    ctx.fillStyle = '#777'; ctx.font = '11px Arial';
    ctx.fillText(mv.desc, px+18, my+42);
  });
}

// ============================================================
// SCREEN: POINT SCORED
// ============================================================
function drawPointScored() {
  const scorer = pointWinner === 0 ? p1 : p2;
  const ch = CHARS[scorer.char];
  const prog = 1 - pointTimer / 200;
  ctx.fillStyle = 'rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
  const scale = 1 + (1-Math.min(prog*2, 1))*0.6;
  ctx.save(); ctx.translate(CX, CY-20); ctx.scale(scale, scale);
  ctx.font = "bold 88px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.strokeStyle = '#000'; ctx.lineWidth = 10;
  ctx.strokeText('POINT!', 0, 0);
  ctx.fillStyle = ch.color; ctx.fillText('POINT!', 0, 0);
  ctx.restore();
  ctx.fillStyle = ch.color; ctx.font = "bold 26px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText(ch.name + ' SCORES!', CX, CY+55);
  ctx.fillStyle = '#fff'; ctx.font = "bold 44px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText(`${p1.wins}  —  ${p2.wins}`, CX, CY+105);
  if (matchOver) {
    const pb = Math.sin(Date.now()/300) > 0 ? 1 : 0;
    ctx.fillStyle = `rgba(255,200,0,${pb})`; ctx.font = "bold 16px 'Arial Black'";
    ctx.fillText('PRESS SPACE TO CONTINUE', CX, CY+150);
  }
}

// ============================================================
// SCREEN: MATCH END / DIALOGUE
// ============================================================
function drawMatchEnd() {
  ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);
  const stage = matchCfg ? matchCfg.stage || 'classic' : 'classic';
  drawTable(stage);
  if (epuck) drawPuck(epuck, true);
  drawPuck(puck); drawPaddle(p1); drawPaddle(p2);
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  const winner = matchWinner===0 ? p1 : p2;
  const wch = CHARS[winner.char];
  ctx.strokeStyle = '#000'; ctx.lineWidth = 7; ctx.font = "bold 52px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.strokeText(wch.name.toUpperCase() + ' WINS!', CX, 90);
  ctx.fillStyle = wch.color; ctx.fillText(wch.name.toUpperCase() + ' WINS!', CX, 90);
  if (me.dialogue.length > 0 && me.dialogIdx < me.dialogue.length) {
    const entry = me.dialogue[me.dialogIdx];
    const ech = entry.speaker ? CHARS[entry.speaker] : null;
    const bh = 135, by = H-bh-12;
    ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(12, by, W-24, bh);
    ctx.strokeStyle = ech ? ech.color : '#c8a000'; ctx.lineWidth = 2; ctx.strokeRect(12, by, W-24, bh);
    if (ech) { ctx.fillStyle = ech.color; ctx.font = "bold 15px 'Arial Black'"; ctx.textAlign = 'left'; ctx.fillText(ech.name.toUpperCase(), 26, by-7); }
    ctx.fillStyle = '#fff'; ctx.font = '18px Arial'; ctx.textAlign = 'left';
    wrapText(me.displayText, 26, by+32, W-60, 27);
    if (me.typeIdx >= entry.text.length) {
      const pb = Math.sin(Date.now()/280) > 0 ? 1 : 0;
      ctx.fillStyle = `rgba(255,200,0,${pb})`; ctx.font = "bold 13px 'Arial Black'"; ctx.textAlign = 'right';
      const hint = (me.dialogIdx === me.dialogue.length-1) ? (me.won ? 'CONTINUE  ▶' : 'RETRY?  (ENTER)  ▶') : '▶';
      ctx.fillText(hint, W-20, by+bh-12);
    }
  } else if (me.dialogue.length > 0 && me.dialogIdx >= me.dialogue.length) {
    const pb = Math.sin(Date.now()/300) > 0 ? 1 : 0;
    ctx.fillStyle = `rgba(255,200,0,${pb})`; ctx.font = "bold 18px 'Arial Black'"; ctx.textAlign = 'center';
    ctx.fillText(me.won ? 'PRESS ENTER TO CONTINUE' : 'PRESS ENTER TO RETRY', CX, H-30);
  }
}

// ============================================================
// SCREEN: VS SELECT
// ============================================================
function drawVsSelect() {
  ctx.fillStyle = '#050505'; ctx.fillRect(0,0,W,H);
  const t = Date.now()/1000;
  for (let i = 0; i < 20; i++) {
    const x = ((Math.sin(i*2.1+t*0.5)*0.5+0.5)*W), y = ((i/20+t*0.03)%1)*H;
    ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fillStyle='rgba(200,150,50,0.2)'; ctx.fill();
  }
  ctx.fillStyle = '#c8a000'; ctx.font = "bold 28px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText('CHARACTER SELECT', CX, 50);
  for (let pi = 0; pi < 2; pi++) {
    const ck = pi===0 ? CHAR_KEYS[vsP1] : CHAR_KEYS[vsP2];
    const ch = CHARS[ck], ox = pi===0 ? W*0.25 : W*0.75;
    ctx.fillStyle = ch.color; ctx.font = "bold 18px 'Arial Black'"; ctx.textAlign = 'center';
    ctx.fillText(`PLAYER ${pi+1}`, ox, 82);
    ctx.fillStyle = '#fff'; ctx.font = "bold 20px 'Arial Black'";
    ctx.fillText(`◄  ${ch.name}  ►`, ox, 112);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '12px Arial';
    ctx.fillText(pi===0 ? 'A / D to change' : '← / → to change', ox, 132);
    ctx.fillStyle = ch.color; ctx.font = "bold 13px 'Arial Black'"; ctx.textAlign = 'left';
    const hx = ox-120, hy = 165;
    ctx.fillStyle = '#333'; ctx.fillRect(hx, hy, 240, 190);
    ctx.strokeStyle = ch.color; ctx.lineWidth = 2; ctx.strokeRect(hx, hy, 240, 190);
    ctx.fillStyle = ch.color; ctx.font = "bold 12px 'Arial Black'"; ctx.textAlign = 'left';
    ctx.fillText('HEAT MOVES:', hx+10, hy+20);
    ch.heatMoves.forEach((mv, i) => {
      ctx.fillStyle = '#fff'; ctx.font = "bold 12px 'Arial Black'";
      ctx.fillText(mv.name, hx+10, hy+44+i*48);
      ctx.fillStyle = '#888'; ctx.font = '11px Arial';
      ctx.fillText(mv.desc, hx+10, hy+60+i*48);
    });
  }
  ctx.fillStyle = '#888'; ctx.font = "bold 16px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText(`STAGE: ${STAGE_NAMES[vsStage]}`, CX, H-100);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px Arial';
  ctx.fillText('W / S to change stage', CX, H-78);
  const pb = Math.sin(t*3) > 0;
  ctx.fillStyle = pb ? '#ff4400' : '#cc2200'; ctx.font = "bold 20px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText('PRESS ENTER TO FIGHT!', CX, H-30);
}

// ============================================================
// SCREEN: ENDING
// ============================================================
function drawEnding() {
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050520'); bg.addColorStop(1,'#000a10');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  const t = Date.now()/1000;
  // Stars
  for (let i=0;i<40;i++) {
    const x = ((Math.sin(i*1.9)*0.5+0.5)*W), y = ((Math.cos(i*2.7)*0.5+0.5)*H);
    ctx.beginPath(); ctx.arc(x,y,1+Math.sin(i+t)*0.5,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,200,${0.3+Math.sin(i*0.7+t)*0.15})`; ctx.fill();
  }
  ctx.strokeStyle = '#000'; ctx.lineWidth = 7; ctx.font = "bold 52px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.strokeText('FOR ELENA.', CX, H*0.22);
  const tg = ctx.createLinearGradient(CX-200,0,CX+200,0);
  tg.addColorStop(0,'#c8a000'); tg.addColorStop(0.5,'#fff7c0'); tg.addColorStop(1,'#c8a000');
  ctx.fillStyle = tg; ctx.fillText('FOR ELENA.', CX, H*0.22);
  ctx.globalAlpha = 0.7+Math.sin(t*0.8)*0.2;
  ctx.fillStyle = '#fff'; ctx.font = '19px Arial'; ctx.textAlign = 'center';
  const lines = [
    'Marco Reyes — Air Hockey World Champion.',
    'Rico Blanco — sentenced to 35 years. No parole.',
    'Old Sal bought a boat. He named it Elena.',
    'Valentina Cruz became #1 ranked in the world.',
    'The President lowered taxes. It did not help.',
    'The golden paddle was put in a museum.',
    'The museum was accidentally set on fire.',
    'Only the paddle survived.'
  ];
  lines.forEach((l, i) => { ctx.fillText(l, CX, H*0.38 + i*33); });
  ctx.globalAlpha = 1;
  const pb = Math.sin(t*2)>0;
  ctx.fillStyle = pb?'#ff4500':'#c83000'; ctx.font = "bold 18px 'Arial Black'"; ctx.textAlign = 'center';
  ctx.fillText('PRESS ENTER TO RETURN TO TITLE', CX, H*0.9);
}

// ============================================================
// STORY LOGIC
// ============================================================
function advanceAct() {
  storyAct++;
  if (storyAct >= ACTS.length) return;
  const act = ACTS[storyAct];
  if (act.type === 'cutscene') {
    state = 'CUTSCENE'; cs = { sceneIdx:0, typeIdx:0, typeTimer:0, displayText:'' };
  } else if (act.type === 'match') {
    startMatch(act);
  } else if (act.type === 'ending') {
    state = 'ENDING';
  }
}
function startMatch(act) {
  initMatch({ ...act, isAI: true });
  introPhase = 0; introTimer = 0;
  state = 'MATCH_INTRO';
}
function startStory() {
  storyAct = -1; advanceAct();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05); lastTime = ts;
  // Apply flash
  ctx.save();
  if (shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.85; if (shake < 0.5) shake = 0; }

  // STATE MACHINE
  if (state === 'TITLE') {
    drawTitle();
    if (pressed('Enter') || pressed('Space')) startStory();
    if (pressed('KeyV')) state = 'VS_SELECT';
  }
  else if (state === 'VS_SELECT') {
    drawVsSelect();
    if (pressed('KeyA')) vsP1 = (vsP1-1+CHAR_KEYS.length)%CHAR_KEYS.length;
    if (pressed('KeyD')) vsP1 = (vsP1+1)%CHAR_KEYS.length;
    if (pressed('ArrowLeft')) vsP2 = (vsP2-1+CHAR_KEYS.length)%CHAR_KEYS.length;
    if (pressed('ArrowRight')) vsP2 = (vsP2+1)%CHAR_KEYS.length;
    if (pressed('KeyW')) vsStage = (vsStage-1+STAGE_NAMES.length)%STAGE_NAMES.length;
    if (pressed('KeyS')) vsStage = (vsStage+1)%STAGE_NAMES.length;
    if (pressed('Escape')) state = 'TITLE';
    if (pressed('Enter')) {
      matchCfg = { player: CHAR_KEYS[vsP1], opponent: CHAR_KEYS[vsP2], stage: ['classic','neon','oval','boss'][vsStage], winsNeeded: 4, isAI: false, winDialogue: [], loseDialogue: [] };
      initMatch(matchCfg); introPhase = 0; introTimer = 0; state = 'MATCH_INTRO';
    }
  }
  else if (state === 'CUTSCENE') {
    drawCutscene(); updateCutsceneType();
  }
  else if (state === 'MATCH_INTRO') {
    drawMatchIntro();
    introTimer++;
    if (introTimer > 65) { introTimer = 0; introPhase++; if (introPhase >= 4) { state = 'PLAYING'; introPhase = 3; } }
  }
  else if (state === 'PLAYING') {
    // Update P1
    if (!p1.isAI) {
      let mx=0, my=0;
      if (keys['KeyW']) my-=1; if (keys['KeyS']) my+=1;
      if (keys['KeyA']) mx-=1; if (keys['KeyD']) mx+=1;
      const gp = getGP(0);
      if (gp) { mx += gp.axes[0]||0; my += gp.axes[1]||0; if (Math.abs(mx)<0.15) mx=0; if (Math.abs(my)<0.15) my=0; }
      const len = Math.hypot(mx, my);
      if (len > 0) { p1.vx = mx/len * p1.speed * dt; p1.vy = my/len * p1.speed * dt; p1.x += p1.vx; p1.y += p1.vy; } else { p1.vx=0; p1.vy=0; }
      constrainPaddle(p1);
      if (!heatActive && pressed('KeyQ') && p1.heat >= 100) { heatActive=true; heatJustOpened=true; heatPlayer=p1; heatIdx=0; addMsg('HEAT MODE!', CHARS[p1.char].color); }
    }
    // Update P2
    if (!p2.isAI) {
      let mx=0, my=0;
      if (keys['ArrowUp']) my-=1; if (keys['ArrowDown']) my+=1;
      if (keys['ArrowLeft']) mx-=1; if (keys['ArrowRight']) mx+=1;
      const gp = getGP(1);
      if (gp) { mx += gp.axes[0]||0; my += gp.axes[1]||0; if (Math.abs(mx)<0.15) mx=0; if (Math.abs(my)<0.15) my=0; }
      const len = Math.hypot(mx, my);
      if (len > 0) { p2.vx = mx/len * p2.speed * dt; p2.vy = my/len * p2.speed * dt; p2.x += p2.vx; p2.y += p2.vy; } else { p2.vx=0; p2.vy=0; }
      constrainPaddle(p2);
      if (!heatActive && pressed('Slash') && p2.heat >= 100) { heatActive=true; heatJustOpened=true; heatPlayer=p2; heatIdx=0; addMsg('HEAT MODE!', CHARS[p2.char].color); }
    } else { updateAI(p2, p1, puck, dt); }
    // Heat select input
    if (heatActive && heatPlayer) {
      const hp = heatPlayer; const isP1 = hp === p1;
      const upKey = isP1 ? 'KeyW' : 'ArrowUp', dnKey = isP1 ? 'KeyS' : 'ArrowDown', cfKey = isP1 ? 'KeyQ' : 'Slash';
      if (heatJustOpened) { heatJustOpened = false; }
      else {
      if (pressed(upKey)) heatIdx = (heatIdx-1+3)%3;
      if (pressed(dnKey)) heatIdx = (heatIdx+1)%3;
      if (pressed(cfKey) || pressed('Enter')) {
        const mv = CHARS[hp.char].heatMoves[heatIdx];
        activateHeat(mv.id, hp, hp===p1?p2:p1);
        hp.heat = 0; heatActive = false; heatPlayer = null;
      }
      }
    }
    // Timers
    for (let i=0;i<2;i++) { if (shields[i]>0) shields[i]--; if (invade[i]>0) invade[i]--; }
    if (reverseGoals>0) { reverseGoals--; if(reverseGoals===0) addMsg('GOALS BACK TO NORMAL', '#ff0'); }
    // Physics (pause during heat select)
    if (!heatActive) {
      puckTrail.push({x:puck.x, y:puck.y}); if (puckTrail.length>10) puckTrail.shift();
      hitPaddlePuck(p1, puck); hitPaddlePuck(p2, puck); stepPuck(puck);
      if (epuck) { hitPaddlePuck(p1, epuck); hitPaddlePuck(p2, epuck); stepPuck(epuck); }
      // Stuck detection: if puck lingers in a corner or small area for too long, kick it toward center
      const inCorner = (puck.x < TL + 120 || puck.x > TR - 120) && (puck.y < TT + 100 || puck.y > TB - 100);
      const puckSpd = Math.hypot(puck.vx, puck.vy);
      if (inCorner || puckSpd < 2) { puckStuckTimer++; } else { puckStuckTimer = Math.max(0, puckStuckTimer - 2); }
      // Track average puck position; if puck stays within 60px radius, count as area-stuck
      puckAvgX += (puck.x - puckAvgX) * 0.05;
      puckAvgY += (puck.y - puckAvgY) * 0.05;
      if (Math.hypot(puck.x - puckAvgX, puck.y - puckAvgY) < 60) { puckAreaTimer++; } else { puckAreaTimer = 0; }
      // Hard failsafe: re-serve if stuck for ~3 seconds
      if (puckStuckTimer > 180) {
        resetPuck();
      } else if (puckStuckTimer > 60 || puckAreaTimer > 60) {
        const angle = Math.atan2(CY - puck.y, CX - puck.x);
        const perp = (Math.random() - 0.5) * 1.5;
        const speed = 10 + Math.random() * 2;
        puck.vx = Math.cos(angle + perp) * speed; puck.vy = Math.sin(angle + perp) * speed;
        puckStuckTimer = Math.max(0, puckStuckTimer - 40);
        puckAreaTimer = 0;
      }
    }
    drawGameplay();
    if (heatActive && heatPlayer) drawHeatSelect(heatPlayer);
  }
  else if (state === 'POINT_SCORED') {
    drawGameplay();
    drawPointScored();
    if (matchOver && (pressed('Space') || pressed('Enter'))) {
      // End match
      const act = ACTS[storyAct];
      me.won = matchWinner === 0;
      me.dialogue = me.won ? (act.winDialogue || []) : (act.loseDialogue || []);
      me.dialogIdx = 0; me.typeIdx = 0; me.typeTimer = 0; me.displayText = '';
      state = 'MATCH_END';
    } else if (!matchOver) {
      pointTimer--;
      if (pointTimer <= 0) { resetPuck(); state = 'PLAYING'; }
    }
  }
  else if (state === 'MATCH_END') {
    drawMatchEnd();
    // Update typewriter
    if (me.dialogIdx < me.dialogue.length) {
      const entry = me.dialogue[me.dialogIdx];
      me.typeTimer++; if (me.typeTimer >= 2) { me.typeTimer=0; if (me.typeIdx<entry.text.length) { me.typeIdx++; me.displayText=entry.text.slice(0,me.typeIdx); } }
      if (pressed('Space') || pressed('Enter')) {
        if (me.typeIdx < entry.text.length) { me.typeIdx=entry.text.length; me.displayText=entry.text; }
        else { me.dialogIdx++; me.typeIdx=0; me.typeTimer=0; me.displayText=''; }
      }
    } else {
      if (pressed('Space') || pressed('Enter')) {
        if (me.won) {
          const isVs = matchCfg && matchCfg.isAI === false;
          if (isVs) { state='VS_SELECT'; }
          else advanceAct();
        } else {
          // Retry
          initMatch(matchCfg); introPhase=0; introTimer=0; state='MATCH_INTRO';
        }
      }
    }
  }
  else if (state === 'ENDING') {
    drawEnding();
    if (pressed('Enter')) { state='TITLE'; storyAct=0; }
  }

  // Flash overlay
  if (flash.a > 0) {
    ctx.fillStyle = `rgba(${flash.r},${flash.g},${flash.b},${flash.a})`;
    ctx.fillRect(0,0,W,H); flash.a *= 0.82; if (flash.a < 0.01) flash.a = 0;
  }
  ctx.restore();

  // Update prevKeys
  for (const k in keys) prevKeys[k] = keys[k];
  requestAnimationFrame(loop);
}

// ============================================================
// BOOTSTRAP
// ============================================================
// Init with dummy so rendering doesn't crash before first match
puck = { x: CX, y: CY, vx: 3, vy: 2, r: PUCK_R };
puckTrail = [];
p1 = { x: TL+110, y: CY, vx:0, vy:0, r: PADDLE_R, speed: 350, heat:0, wins:0, side:0, char:'marco', isAI:false, powerShot:false, ghostMode:false };
p2 = { x: TR-110, y: CY, vx:0, vy:0, r: PADDLE_R, speed: 320, heat:0, wins:0, side:1, char:'rico',  isAI:true,  powerShot:false, ghostMode:false };
matchCfg = { player:'marco', opponent:'rico', stage:'classic', winsNeeded:4 };
requestAnimationFrame(loop);
</script>
